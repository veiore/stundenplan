<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schulungswoche</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --police-blue: #005a9b;
            --gray-bg: #f4f7f9;
            --gray-border: #dee2e6;
            --cancel-red: #d90429;
            --sub-orange: #f39c12;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--gray-bg); }
        .container { max-width: 1500px; margin: 20px auto; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        .header-section { display: flex; align-items: center; padding: 20px 30px; gap: 20px; border-bottom: 4px solid var(--police-blue); }
        .logo-box { font-size: 32px; font-weight: bold; color: var(--police-blue); border: 4px solid var(--police-blue); padding: 5px 15px; }
        .header-text h1 { margin: 0; color: var(--police-blue); font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: 140px repeat(7, 1fr); border-collapse: collapse; }
        .cell { border: 1px solid var(--gray-border); min-height: 45px; padding: 5px; display: flex; flex-direction: column; justify-content: center; text-align: center; font-size: 11px; cursor: pointer; transition: 0.1s; }
        .head { background: var(--police-blue); color: white; font-weight: 700; cursor: default; height: 40px; }
        .time { background: #e9ecef; font-weight: 600; color: var(--police-blue); cursor: default; }
        
        .pause-row { grid-column: 1 / -1; background: var(--police-blue); color: white; font-size: 9px; text-align: center; padding: 2px; font-weight: bold; letter-spacing: 3px; cursor: default; }

        /* Kurs-Farben */
        .sonstiges { background: #7B2E75; color: white; }
        .fsv { background: #7b5ba7; color: white; }
        .el  { background: #3aa6a1; color: white; }
        .vl  { background: #6bbf59; color: white; }
        .spr { background: #d6b24c; color: white; }
        .fl  { background: #c05656; color: white; }
        .pp  { background: #c98b2d; color: white; }
        .tp  { background: #AD3636; color: white; }

        .cancelled { background: #fceaea !important; color: var(--cancel-red) !important; text-decoration: line-through; border: 1px solid var(--cancel-red) !important; }
        .substitution { border: 2px solid var(--sub-orange) !important; }

        .footer { background: var(--police-blue); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: #fff; width: 380px; border-radius: 20px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .modal-badge { display: inline-block; padding: 6px 14px; border-radius: 8px; color: white; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .info-card { border: 1px solid #eee; border-radius: 12px; padding: 12px; margin-bottom: 10px; background: #fafafa; }
        .info-card label { display: block; font-size: 10px; color: #888; font-weight: 700; text-transform: uppercase; margin-bottom: 3px; }
        
        /* Dozent Vertretung Style */
        .old-teacher { text-decoration: line-through; color: #999; }
        .arrow { color: var(--sub-orange); font-weight: bold; margin: 0 8px; font-size: 18px; }
        .new-teacher { color: var(--sub-orange); font-weight: 700; }

        .btn-close { width: 100%; padding: 12px; background: var(--police-blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="logo-box">REU</div>
        <div class="header-text">
            <h1>Landespolizei Nordrhein-Westfalen</h1>
            <p>Landkreis Reuth | Studium</p>
        </div>
    </div>

    <div id="timetableGrid" class="grid"></div>

    <div class="footer">
        <div>SCHULUNGSWOCHE:</div>
        <div>20.04.–26.04.2026</div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
        <div id="m-badge" class="modal-badge">MODUL</div>
        <h2 id="m-subject" style="margin:0 0 15px 0; font-size: 20px;">Kursname</h2>
        <div class="info-card"><label>Dozent</label><span id="m-teacher"></span></div>
        <div class="info-card"><label>Raum</label><span id="m-room"></span></div>
        <div class="info-card"><label>Nachricht</label><span id="m-msg"></span></div>
        <button class="btn-close" onclick="closeModal()">Schließen</button>
    </div>
</div>

<script>
/**
 * DATEN-KONFIGURATION
 * message: Hier deine Nachricht eintragen.
 * teacherNew: Nur bei type: 'sub' nötig.
 */
const scheduleData = [
    { day: 1, time: "16:30-17:00", subject: "Einführungstunde", code: "E", room: "006 (Auditorium)", teacher: "K. Albrecht, F. Schwarz", type: "cancel", css: "sonstiges", message: "-" },
    { day: 3, time: "18:00-18:30", subject: "Fitness/Selbstverteidigung", code: "FSV", room: "005", teacher: "David Buchmann", teacherNew: "David Buchmann", type: "sub", css: "fsv", message: "verlegt von Montag (17 Uhr)" },
    { day: 6, time: "17:00-17:30", subject: "Führungslehre", code: "FL", room: "002", teacher: "Fabian Schwarz", teacherNew: "Fabian Schwarz", type: "sub", css: "fl", message: "verlegt von Montag (19:15 Uhr)" },
    
    // Beispiel für eine Vertretung
    { day: 2, time: "18:00-18:30", subject: "Einsatzlehre", code: "EL", room: "003", teacher: "Konstantin Albrecht", type: "cancel", css: "el", message: "Diese Stunde fällt leider aus." },
    { day: 6, time: "18:00-18:30", subject: "Straf- und Polizeirecht", code: "SPR", room: "002", teacher: "Konrad W. Gerlach", teacherNew: "Konrad W. Gerlach", type: "sub", css: "spr", message: "verlegt vom Dienstag (19:15)" },
    
    { day: 2, time: "18:30-19:00", subject: "Einsatzlehre", code: "EL", room: "003", teacher: "Fabian Schwarz", type: "cancel", css: "el" },
    { day: 3, time: "18:30-19:00", subject: "Straf- und Polizeirecht", code: "SPR", room: "002", teacher: "Konrad W. Gerlach", type: "normal", css: "spr" },
    { day: 4, time: "18:00-18:30", subject: "Verkehrslehre", code: "VL", room: "003", teacher: "Konstantin Albrecht", type: "normal", css: "vl" },
    { day: 4, time: "18:30-19:00", subject: "Verkehrslehre", code: "VL", room: "003", teacher: "Fabian Schwarz", type: "normal", css: "vl" },
    { day: 5, time: "18:00-18:30", subject: "Fitness/Selbstverteidigung", code: "FSV", room: "005", teacher: "David Buchmann", type: "normal", css: "fsv" },
    { day: 5, time: "18:30-19:00", subject: "Einsatzlehre", code: "EL", room: "003", teacher: "Konstantin Albrecht", type: "normal", css: "el" },
    { day: 5, time: "19:15-19:45", subject: "Einsatzlehre", code: "EL", room: "003", teacher: "Fabian Schwarz", type: "normal", css: "el" },
    { day: 6, time: "18:30-19:00", subject: "Führungslehre", code: "FL", room: "002", teacher: "David Buchmann", type: "normal", css: "fl" },
    { day: 6, time: "19:15-19:45", subject: "Verkehrslehre", code: "VL", room: "003", teacher: "Konstantin Albrecht", type: "normal", css: "vl" },
    { day: 6, time: "19:45-20:15", subject: "Verkehrslehre", code: "VL", room: "003", teacher: "Fabian Schwarz", type: "normal", css: "vl" },
    { day: 7, time: "16:30-17:00", subject: "theoretische Prüfung PK", code: "PK", room: "006 (Auditorium)", teacher: "-", type: "normal", css: "tp" },
    { day: 7, time: "18:30-19:00", subject: "praktische Prüfung PK", code: "PK", room: "006 (Auditorium)", teacher: "-", type: "normal", css: "pp" },
    { day: 7, time: "17:00-17:30", subject: "praktische Prüfung PK", code: "PK", room: "006 (Auditorium)", teacher: "-", type: "normal", css: "pp" },
    { day: 7, time: "18:00-18:30", subject: "praktische Prüfung PK", code: "PK", room: "006 (Auditorium)", teacher: "-", type: "normal", css: "pp" }
];

const timeDefinition = [
    { label: "15:00-15:30", type: "time" },
    { label: "15:30-16:00", type: "time" },
    { label: "PAUSE (30 MIN)", type: "pause" },
    { label: "16:30-17:00", type: "time" },
    { label: "17:00-17:30", type: "time" },
    { label: "PAUSE (30 MIN)", type: "pause" },
    { label: "18:00-18:30", type: "time" },
    { label: "18:30-19:00", type: "time" },
    { label: "PAUSE (15 MIN)", type: "pause" },
    { label: "19:15-19:45", type: "time" },
    { label: "19:45-20:15", type: "time" },
    { label: "PAUSE (15 MIN)", type: "pause" },
    { label: "20:30-21:00", type: "time" }
];

function initGrid() {
    const grid = document.getElementById('timetableGrid');
    let html = '<div class="cell head">ZEIT</div><div class="cell head">MO</div><div class="cell head">DI</div><div class="cell head">MI</div><div class="cell head">DO</div><div class="cell head">FR</div><div class="cell head">SA</div><div class="cell head">SO</div>';

    timeDefinition.forEach(slot => {
        if (slot.type === "pause") {
            html += `<div class="pause-row">${slot.label}</div>`;
        } else {
            html += `<div class="cell time">${slot.label}</div>`;
            for (let day = 1; day <= 7; day++) {
                const entry = scheduleData.find(e => e.day === day && e.time === slot.label);
                if (entry) {
                    let statusClass = entry.type === 'cancel' ? 'cancelled' : (entry.type === 'sub' ? 'substitution' : '');
                    html += `<div class="cell ${entry.css} ${statusClass}" onclick="openModal('${encodeURIComponent(JSON.stringify(entry))}')">
                                <strong>${entry.subject}</strong>
                                <span>${entry.room}</span>
                             </div>`;
                } else {
                    html += `<div class="cell"></div>`;
                }
            }
        }
    });
    grid.innerHTML = html;
}

function openModal(json) {
    const data = JSON.parse(decodeURIComponent(json));
    const overlay = document.getElementById('modalOverlay');
    
    document.getElementById('m-subject').innerText = data.subject;
    document.getElementById('m-badge').innerText = data.code;
    document.getElementById('m-badge').className = `modal-badge ${data.css}`;
    document.getElementById('m-room').innerText = data.room;

    const teacherBox = document.getElementById('m-teacher');
    const msgBox = document.getElementById('m-msg');

    // Dozenten Logik
    if (data.type === 'sub') {
        teacherBox.innerHTML = `<span class="old-teacher">${data.teacher}</span><span class="arrow">→</span><span class="new-teacher">${data.teacherNew}</span>`;
    } else if (data.type === 'cancel') {
        teacherBox.innerHTML = `<span class="old-teacher">${data.teacher}</span>`;
    } else {
        teacherBox.innerText = data.teacher;
    }

    // Nachricht Logik
    if (data.message && data.message.trim() !== "") {
        msgBox.innerText = data.message;
    } else {
        if (data.type === 'cancel') msgBox.innerText = "ENTFALL: Dieser Termin findet nicht statt.";
        else if (data.type === 'sub') msgBox.innerText = "Vertretung: Geänderter Dozent.";
        else msgBox.innerText = "-";
    }

    overlay.style.display = 'flex';
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
initGrid();
</script>
</body>
</html>
